<!DOCTYPE html>
<html>

<head>
    <title>ANN Animal Recognition</title>

    <style>

        body{
            font-family: Arial;
            background:#f0f0f0;
            padding:20px;
        }

        .container{
            background:white;
            padding:20px;
            border-radius:10px;
            max-width:900px;
        }

        canvas{
            border:2px solid black;
            background:white;
            cursor:crosshair;
        }

        button{
            padding:10px 20px;
            margin-top:10px;
            margin-right:10px;
            border:none;
            border-radius:5px;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        .clear{
            background:#dc3545;
        }

        .predict{
            background:#007bff;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>APP nhận dạng hình vẽ động vật bằng ANN</h1>

    <p>
        Vẽ đầu con vật đơn giản:
        Heo, Mèo, Chuột, Chó hoặc Voi.
    </p>

    <canvas id="canvas" width="320" height="320"></canvas>

    <br>

    <button class="clear" onclick="clearCanvas()">
        Clear
    </button>

    <button class="predict" onclick="predictImage()">
        Predict
    </button>

    <h2 id="result">
        Dự đoán:
    </h2>

</div>

<script>

const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

ctx.fillStyle = "white";
ctx.fillRect(0, 0, canvas.width, canvas.height);

let drawing = false;

canvas.addEventListener("mousedown", () => {
    drawing = true;
});

canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
});

canvas.addEventListener("mousemove", draw);

function draw(event){

    if(!drawing) return;

    ctx.lineWidth = 12;

    ctx.lineCap = "round";

    ctx.strokeStyle = "black";

    const rect = canvas.getBoundingClientRect();

    ctx.lineTo(
        event.clientX - rect.left,
        event.clientY - rect.top
    );

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(
        event.clientX - rect.left,
        event.clientY - rect.top
    );
}

function clearCanvas(){

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    ctx.fillRect(0, 0, canvas.width, canvas.height);

    document.getElementById("result").innerHTML =
        "Dự đoán:";
}

async function predictImage(){

    const image = canvas.toDataURL("image/png");

    const response = await fetch("/predict", {

        method: "POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            image:image
        })
    });

    const data = await response.json();

    console.log(data);

    document.getElementById("result").innerHTML =
        "Dự đoán: "
        + data.prediction
        + " | Độ tin cậy: "
        + data.confidence
        + "%";
}

</script>

</body>

</html>
